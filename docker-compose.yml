# Только PostgreSQL для локальной разработки mini_prod.
# Запуск: docker compose up -d
# Остановка: docker compose down
#
# В .env задайте POSTGRES_HOST=localhost (или не задавайте — по умолчанию подставится при запуске приложения).

services:
  postgres:
    image: postgres:16-alpine
    container_name: mini-prod-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weu_platform}
      POSTGRES_USER: ${POSTGRES_USER:-weu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weu_secret_change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - mini_prod_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weu} -d ${POSTGRES_DB:-weu_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=128MB"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        ftp_proxy: ${ftp_proxy:-}
        no_proxy: ${no_proxy:-localhost,127.0.0.1,::1}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        FTP_PROXY: ${FTP_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
    container_name: mini-prod-backend
    working_dir: /workspace
    command: >
      sh -lc "python manage.py migrate --noinput &&
      python manage.py runserver 0.0.0.0:9000"
    environment:
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      ftp_proxy: ${ftp_proxy:-}
      no_proxy: ${no_proxy:-localhost,127.0.0.1,::1,postgres,mcp-demo,mcp-keycloak,backend,frontend}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      FTP_PROXY: ${FTP_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,postgres,mcp-demo,mcp-keycloak,backend,frontend}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-weu_platform}
      POSTGRES_USER: ${POSTGRES_USER:-weu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weu_secret_change_me}
      FRONTEND_APP_URL: ${FRONTEND_APP_URL:-http://127.0.0.1:8080}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost,10.169.66.211}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://127.0.0.1:8080,http://localhost:8080,http://10.169.66.211:8080}
      DJANGO_PORT: 9000
    ports:
      - "${DJANGO_PORT:-9000}:9000"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/api/health/', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        ftp_proxy: ${ftp_proxy:-}
        no_proxy: ${no_proxy:-localhost,127.0.0.1,::1}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        FTP_PROXY: ${FTP_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
    container_name: mini-prod-frontend
    working_dir: /workspace/ai-server-terminal-main
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      ftp_proxy: ${ftp_proxy:-}
      no_proxy: ${no_proxy:-localhost,127.0.0.1,::1,postgres,mcp-demo,mcp-keycloak,backend,frontend,nginx}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      FTP_PROXY: ${FTP_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,postgres,mcp-demo,mcp-keycloak,backend,frontend,nginx}
      VITE_DJANGO_URL: http://backend:9000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    expose:
      - "8080"
    volumes:
      - ./ai-server-terminal-main:/workspace/ai-server-terminal-main
      - mini_prod_frontend_node_modules:/workspace/ai-server-terminal-main/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: mini-prod-nginx
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/nginx-health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  mcp-demo:
    image: python:3.12-slim
    container_name: mini-prod-mcp-demo
    working_dir: /workspace
    command: ["python", "studio/demo_mcp_server.py", "--http", "--host", "0.0.0.0", "--port", "8765"]
    ports:
      - "${STUDIO_MCP_DEMO_PORT:-8765}:8765"
    volumes:
      - .:/workspace
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-keycloak:
    build:
      context: .
      dockerfile: docker/keycloak-mcp.Dockerfile
      args:
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        ftp_proxy: ${ftp_proxy:-}
        no_proxy: ${no_proxy:-localhost,127.0.0.1,::1}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        FTP_PROXY: ${FTP_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
    container_name: mini-prod-mcp-keycloak
    working_dir: /workspace
    command: ["python", "key_mcp.py", "--http", "--host", "0.0.0.0", "--port", "8766"]
    environment:
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      ftp_proxy: ${ftp_proxy:-}
      no_proxy: ${no_proxy:-localhost,127.0.0.1,::1}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      FTP_PROXY: ${FTP_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-}
      KEYCLOAK_TOKEN_REALM: ${KEYCLOAK_TOKEN_REALM:-}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-admin-cli}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN_USER:-}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-}
      KEYCLOAK_DEFAULT_PROFILE: ${KEYCLOAK_DEFAULT_PROFILE:-}
      KEYCLOAK_PROFILES_FILE: ${KEYCLOAK_PROFILES_FILE:-keycloak_profiles.json}
      KEYCLOAK_VERIFY_SSL: ${KEYCLOAK_VERIFY_SSL:-true}
      KEYCLOAK_ALLOW_INSECURE_HTTP: ${KEYCLOAK_ALLOW_INSECURE_HTTP:-false}
      KEYCLOAK_PROD_URL: ${KEYCLOAK_PROD_URL:-}
      KEYCLOAK_PROD_REALM: ${KEYCLOAK_PROD_REALM:-}
      KEYCLOAK_PROD_TOKEN_REALM: ${KEYCLOAK_PROD_TOKEN_REALM:-master}
      KEYCLOAK_PROD_CLIENT_ID: ${KEYCLOAK_PROD_CLIENT_ID:-admin-cli}
      KEYCLOAK_PROD_ADMIN_USER: ${KEYCLOAK_PROD_ADMIN_USER:-}
      KEYCLOAK_PROD_ADMIN_PASSWORD: ${KEYCLOAK_PROD_ADMIN_PASSWORD:-}
      KEYCLOAK_PROD_CLIENT_SECRET: ${KEYCLOAK_PROD_CLIENT_SECRET:-}
      KEYCLOAK_PROD_VERIFY_SSL: ${KEYCLOAK_PROD_VERIFY_SSL:-true}
      KEYCLOAK_TEST_URL: ${KEYCLOAK_TEST_URL:-}
      KEYCLOAK_TEST_REALM: ${KEYCLOAK_TEST_REALM:-}
      KEYCLOAK_TEST_TOKEN_REALM: ${KEYCLOAK_TEST_TOKEN_REALM:-master}
      KEYCLOAK_TEST_CLIENT_ID: ${KEYCLOAK_TEST_CLIENT_ID:-admin-cli}
      KEYCLOAK_TEST_ADMIN_USER: ${KEYCLOAK_TEST_ADMIN_USER:-}
      KEYCLOAK_TEST_ADMIN_PASSWORD: ${KEYCLOAK_TEST_ADMIN_PASSWORD:-}
      KEYCLOAK_TEST_CLIENT_SECRET: ${KEYCLOAK_TEST_CLIENT_SECRET:-}
      KEYCLOAK_TEST_VERIFY_SSL: ${KEYCLOAK_TEST_VERIFY_SSL:-true}
    ports:
      - "${STUDIO_KEYCLOAK_MCP_PORT:-8766}:8766"
    volumes:
      - .:/workspace
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8766/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mini_prod_postgres_data:
  mini_prod_frontend_node_modules:
