name: Playwright Smoke

on:
  pull_request:
    paths:
      - "ai-server-terminal-main/**"
      - ".github/workflows/playwright-smoke.yml"
  push:
    branches:
      - main
    paths:
      - "ai-server-terminal-main/**"
      - ".github/workflows/playwright-smoke.yml"

jobs:
  smoke-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-server-terminal-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ai-server-terminal-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke e2e
        run: npm run test:e2e:smoke
