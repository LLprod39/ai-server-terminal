<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1180" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09121E"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 72) rotate(55) scale(480 720)">
      <stop stop-color="#1D4ED8" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#1D4ED8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1010 120) rotate(120) scale(420 420)">
      <stop stop-color="#14B8A6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelStroke" x1="720" y1="54" x2="1202" y2="368" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2F4B74"/>
      <stop offset="1" stop-color="#18253A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="116" y2="116" gradientUnits="userSpaceOnUse">
