  <text x="80" y="203" fill="#B8C6D8" font-family="Segoe UI, Arial, sans-serif" font-size="22">Servers, terminals and controlled automation in one workspace.</text>
  <text x="80" y="242" fill="#7E94AE" font-family="Segoe UI, Arial, sans-serif" font-size="18">Django API + WebSocket backend, React SPA, Studio for pipelines and a separate WinUI desktop shell.</text>

