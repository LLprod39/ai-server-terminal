map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 8080;
    server_name _;

    underscores_in_headers on;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-User $http_x_forwarded_user;
    proxy_set_header X-Remote-User $http_x_remote_user;
    proxy_set_header Remote-User $http_remote_user;
    proxy_set_header X-Auth-Request-User $http_x_auth_request_user;
    proxy_set_header X-Forwarded-Preferred-Username $http_x_forwarded_preferred_username;
    proxy_set_header REMOTE_USER $http_remote_user;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://backend:9000;
    }

    location /servers/api/ {
        proxy_pass http://backend:9000;
    }

    location ^~ /admin/ {
        proxy_pass http://backend:9000;
    }

    location = /login/ {
        proxy_pass http://backend:9000;
    }

    location = /logout/ {
        proxy_pass http://backend:9000;
    }

    location ^~ /media/ {
        proxy_pass http://backend:9000;
    }

    location ^~ /static/ {
        proxy_pass http://backend:9000;
    }

    location /ws/ {
        proxy_pass http://backend:9000;
        proxy_read_timeout 3600;
    }

    location / {
        proxy_pass http://frontend:8080;
    }
}
