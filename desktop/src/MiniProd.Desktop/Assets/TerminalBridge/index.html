<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MiniProd Terminal Workspace</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell" id="app">
    <header class="topbar">
      <div class="left-cluster">
        <button class="session-tab is-active" id="sessionTab" type="button" title="Current session">
          <span class="state-indicator" id="stateDot" aria-hidden="true"></span>
          <span class="tab-copy">
            <span class="tab-title" id="tabName">No server selected</span>
            <span class="tab-subtitle" id="tabSub">Standalone workspace</span>
          </span>
        </button>
        <button class="session-tab ghost" type="button" title="More tabs in next version" disabled>+</button>
      </div>

      <div class="right-cluster">
        <label class="select-shell" title="Saved servers">
          <select id="serverSelect" aria-label="Servers"></select>
        </label>
        <button class="button button-primary" id="connectButton" type="button">Connect</button>
        <button class="button" id="disconnectButton" type="button">Disconnect</button>
        <button class="button button-ai" id="toggleAiButton" type="button">AI</button>
      </div>
    </header>

    <section class="workspace">
      <section class="terminal-frame">
        <div class="terminal-head">
          <div class="terminal-head-left">
            <span class="window-dot red"></span>
            <span class="window-dot yellow"></span>
            <span class="window-dot green"></span>
            <div class="terminal-copy">
              <strong id="headerTitle">MiniProd Terminal</strong>
              <span id="headerSub">Select a saved server and connect.</span>
            </div>
          </div>

          <div class="terminal-head-right">
            <span class="chip chip-mono" id="sessionChip">bridge</span>
            <span class="chip" id="connectionChip">disconnected</span>
            <button class="button button-quiet" id="clearButton" type="button">Clear</button>
            <button class="button button-quiet" id="interruptButton" type="button">Ctrl+C</button>
          </div>
        </div>

        <article class="terminal-view" id="terminal" aria-live="polite"></article>

        <div class="command-row">
          <span class="prompt-symbol" aria-hidden="true">$</span>
          <label class="command-shell">
            <input
              id="commandInput"
              class="command-input"
              type="text"
              placeholder="Run command. Up/Down history, Enter execute."
              autocomplete="off"
              spellcheck="false">
          </label>
          <button class="button button-primary" id="sendCommand" type="button">Run</button>
        </div>

        <footer class="status-row">
          <div class="status-main">
            <span class="status-label">Status</span>
            <strong id="footerStatus">Disconnected</strong>
          </div>
          <div class="status-hints">
            <span>Enter: run</span>
            <span>Ctrl+Enter: ask AI</span>
            <span>Ctrl+J: toggle AI</span>
          </div>
        </footer>
      </section>

      <div class="drawer-handle" id="resizeHandle" title="Resize AI panel"></div>

      <aside class="assistant-drawer" id="drawer">
        <header class="drawer-head">
          <div class="drawer-title">
            <span class="drawer-mark">AI</span>
            <div>
              <strong>Assistant</strong>
              <span id="aiState">Waiting for bootstrap</span>
            </div>
          </div>
          <div class="drawer-actions">
            <button class="button button-quiet" id="closeAiButton" type="button">Hide</button>
            <button class="button button-quiet" id="stopAi" type="button" disabled>Stop</button>
          </div>
        </header>

        <section class="mode-row">
          <span class="mode-label">Execution mode</span>
          <div class="mode-switch">
            <button class="mode active" data-mode="auto" type="button">Auto</button>
            <button class="mode" data-mode="fast" type="button">Fast</button>
            <button class="mode" data-mode="step" type="button">Step</button>
          </div>
        </section>

        <section class="messages" id="aiMessages">
          <div class="empty-state" id="aiEmpty">
            <p>Ask about terminal output, errors, or the next safe command.</p>
            <button class="quick-action" data-p="Explain what is happening in the terminal output." type="button">Explain output</button>
            <button class="quick-action" data-p="What caused this error and how do I fix it?" type="button">Fix error</button>
            <button class="quick-action" data-p="Suggest the next safe command to run." type="button">Next command</button>
          </div>
        </section>

        <footer class="composer-wrap">
          <label class="composer-shell">
            <textarea
              id="aiPrompt"
              class="prompt-input"
              placeholder="Ask assistant about this terminal session"></textarea>
          </label>
          <div class="composer-actions">
            <button class="button button-primary" id="askAi" type="button">Ask AI</button>
            <span id="aiHint">Ctrl+Enter to send</span>
          </div>
        </footer>
      </aside>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
