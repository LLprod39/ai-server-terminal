services:
  - type: web
    name: mini-prod-backend
    runtime: docker
    plan: free
    dockerfilePath: ./docker/backend.Dockerfile
    dockerContext: .
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: SERVE_STATIC_FILES
        value: "true"
      - key: CROSS_SITE_AUTH
        value: "true"
      # Update if Render assigns a different frontend URL or you later attach a custom domain.
      - key: FRONTEND_APP_URL
        value: https://mini-prod-frontend.onrender.com
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: POSTGRES_HOST
        fromDatabase:
          name: mini-prod-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: mini-prod-postgres
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: mini-prod-postgres
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: mini-prod-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: mini-prod-postgres
          property: password
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: mini-prod-frontend
    runtime: static
    plan: free
    rootDir: ai-server-terminal-main
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=3600
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    envVars:
      # Update if the backend service URL differs from the default hostname based on its name.
      - key: VITE_API_BASE
        value: https://mini-prod-backend.onrender.com
      - key: VITE_BACKEND_ORIGIN
        value: https://mini-prod-backend.onrender.com
      - key: VITE_DJANGO_WS_URL
        value: wss://mini-prod-backend.onrender.com

databases:
  - name: mini-prod-postgres
    databaseName: mini_prod
    user: mini_prod
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
