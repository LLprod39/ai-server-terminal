# Production-oriented stack for mini_prod.
# Usage:
#   copy .env.production.example to .env.production and edit secrets/hosts
#   docker compose --env-file .env.production -f docker-compose.production.yml up -d --build
# Stop:
#   docker compose --env-file .env.production -f docker-compose.production.yml down

services:
  postgres:
    image: postgres:16-alpine
    container_name: mini-prod-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - mini_prod_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: mini-prod-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - mini_prod_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        ftp_proxy: ${ftp_proxy:-}
        no_proxy: ${no_proxy:-localhost,127.0.0.1,::1}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        FTP_PROXY: ${FTP_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
    container_name: mini-prod-backend
    command: ["sh", "-lc", "./docker/render-backend-start.sh"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_PORT: 9000
      PORT: 9000
      SITE_URL: ${SITE_URL}
      FRONTEND_APP_URL: ${FRONTEND_APP_URL}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      CHANNEL_REDIS_URL: ${CHANNEL_REDIS_URL:-redis://redis:6379/1}
      APP_LOG_FILE: ${APP_LOG_FILE:-/workspace/logs/webtrerm.log}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_LOG_ROTATION: ${APP_LOG_ROTATION:-50 MB}
      APP_LOG_RETENTION: ${APP_LOG_RETENTION:-14 days}
      APP_LOG_SYSLOG_ENABLED: ${APP_LOG_SYSLOG_ENABLED:-false}
      APP_LOG_SYSLOG_ADDRESS: ${APP_LOG_SYSLOG_ADDRESS:-localhost:514}
      APP_LOG_SYSLOG_PROTOCOL: ${APP_LOG_SYSLOG_PROTOCOL:-udp}
      APP_LOG_SYSLOG_FACILITY: ${APP_LOG_SYSLOG_FACILITY:-LOG_USER}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-true}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-true}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-31536000}
      SECURE_HSTS_INCLUDE_SUBDOMAINS: ${SECURE_HSTS_INCLUDE_SUBDOMAINS:-true}
      SECURE_HSTS_PRELOAD: ${SECURE_HSTS_PRELOAD:-false}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      ftp_proxy: ${ftp_proxy:-}
      no_proxy: ${no_proxy:-localhost,127.0.0.1,::1,postgres,redis,backend,frontend,nginx}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      FTP_PROXY: ${FTP_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,postgres,redis,backend,frontend,nginx}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROK_API_KEY: ${GROK_API_KEY:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
      PIPELINE_NOTIFY_EMAIL: ${PIPELINE_NOTIFY_EMAIL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "${DJANGO_HOST_PORT:-9000}:9000"
    volumes:
      - mini_prod_media:/workspace/media
      - mini_prod_staticfiles:/workspace/staticfiles
      - mini_prod_logs:/workspace/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 45s
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/api/health/', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        ftp_proxy: ${ftp_proxy:-}
        no_proxy: ${no_proxy:-localhost,127.0.0.1,::1}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        FTP_PROXY: ${FTP_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
    container_name: mini-prod-frontend
    environment:
      VITE_DJANGO_URL: http://backend:9000
      NODE_ENV: production
    expose:
      - "8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:1.27-alpine
    container_name: mini-prod-nginx
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    volumes:
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - mini_prod_staticfiles:/srv/static:ro
      - mini_prod_media:/srv/media:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/nginx-health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  mcp-keycloak:
    profiles: ["mcp"]
    build:
      context: .
      dockerfile: docker/keycloak-mcp.Dockerfile
      args:
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        ftp_proxy: ${ftp_proxy:-}
        no_proxy: ${no_proxy:-localhost,127.0.0.1,::1}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        FTP_PROXY: ${FTP_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1}
    container_name: mini-prod-mcp-keycloak
    working_dir: /workspace
    command: ["python", "key_mcp.py", "--http", "--host", "0.0.0.0", "--port", "8766"]
    environment:
      KEYCLOAK_URL: ${KEYCLOAK_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-}
      KEYCLOAK_TOKEN_REALM: ${KEYCLOAK_TOKEN_REALM:-}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-admin-cli}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN_USER:-}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-}
      KEYCLOAK_DEFAULT_PROFILE: ${KEYCLOAK_DEFAULT_PROFILE:-}
      KEYCLOAK_PROFILES_FILE: ${KEYCLOAK_PROFILES_FILE:-keycloak_profiles.json}
      KEYCLOAK_VERIFY_SSL: ${KEYCLOAK_VERIFY_SSL:-true}
      KEYCLOAK_ALLOW_INSECURE_HTTP: ${KEYCLOAK_ALLOW_INSECURE_HTTP:-false}
    ports:
      - "${STUDIO_KEYCLOAK_MCP_PORT:-8766}:8766"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8766/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  mini_prod_postgres_data:
  mini_prod_redis_data:
  mini_prod_media:
  mini_prod_staticfiles:
  mini_prod_logs:
