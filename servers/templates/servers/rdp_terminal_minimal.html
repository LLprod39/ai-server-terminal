{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ server.name }} — RDP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #000; color: #d4d4d8; font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; }
.toolbar { display:flex; align-items:center; gap:7px; padding:6px 12px; background:#0d0d0f; border-bottom:1px solid rgba(255,255,255,.07); flex-shrink:0; }
.status-pill { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:10px; font-weight:600; background:rgba(107,114,128,.1); border:1px solid rgba(107,114,128,.3); color:#9ca3af; }
.status-pill.connected  { background:rgba(34,197,94,.1);  border-color:rgba(34,197,94,.3);  color:#4ade80; }
.status-pill.connecting { background:rgba(245,158,11,.1); border-color:rgba(245,158,11,.3); color:#fbbf24; }
.status-pill.error      { background:rgba(239,68,68,.1);  border-color:rgba(239,68,68,.3);  color:#f87171; }
.rdp-area { flex:1; position:relative; background:#000; overflow:hidden; display:flex; align-items:center; justify-content:center; }
#rdp-canvas { position:absolute; inset:0; overflow:hidden; }
#rdp-canvas canvas { display:block; }
.connect-card { background:#111113; border:1px solid rgba(255,255,255,.1); border-radius:16px; padding:24px 28px; width:300px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.7); z-index:10; position:relative; }
.form-input { width:100%; padding:8px 10px; border-radius:8px; font-size:12px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); color:#fff; outline:none; margin-bottom:8px; }
.form-input:focus { border-color:#a855f7; }
.btn-connect { width:100%; padding:9px; border-radius:9px; font-size:12px; font-weight:700; background:#a855f7; color:#fff; border:none; cursor:pointer; transition:background .15s; display:flex; align-items:center; justify-content:center; gap:5px; }
.btn-connect:hover { background:#9333ea; }
.error-panel { position:absolute; inset:0; z-index:20; display:none; flex-direction:column; align-items:center; justify-content:center; gap:10px; background:rgba(0,0,0,.75); }
.error-panel.visible { display:flex; }
.tb-btn { display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:6px; border:none; background:transparent; color:#6b7280; cursor:pointer; font-size:14px; transition:all .15s; }
.tb-btn:hover { background:rgba(255,255,255,.1); color:#fff; }
</style>
</head>
<body>
<!-- Toolbar -->
<div class="toolbar">
    <span style="font-size:11px;color:#9ca3af;font-weight:600;">{{ server.name }}</span>
    <span style="font-size:10px;color:#4b5563;font-family:'JetBrains Mono',monospace;">{{ server.host }}</span>
    <span class="status-pill" id="status-pill">
        <span id="status-text">Disconnected</span>
    </span>
    <div style="flex:1;"></div>
    <button class="tb-btn" onclick="sendCtrlAltDel()" title="Ctrl+Alt+Del" style="font-size:12px;">⌨</button>
    <button class="tb-btn" onclick="toggleFs()" title="Fullscreen" style="font-size:13px;" id="fs-btn">⛶</button>
    <button id="disconnect-btn" onclick="disconnectRdp()" style="display:none;padding:5px 10px;border-radius:7px;background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2);cursor:pointer;font-size:10px;font-weight:600;">Disconnect</button>
</div>

<!-- RDP Area -->
<div class="rdp-area" id="rdp-area">
    <div id="rdp-canvas"></div>

    <!-- Connect card -->
    <div class="connect-card" id="connect-card">
        <div style="width:44px;height:44px;border-radius:12px;background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
            <span style="font-size:22px;">🖥</span>
        </div>
        <h3 style="font-size:14px;font-weight:700;color:#fff;margin-bottom:3px;">{{ server.name }}</h3>
        <p style="font-size:10px;color:#6b7280;margin-bottom:16px;font-family:'JetBrains Mono',monospace;">{{ server.host }}:{{ server.port|default:3389 }}</p>
        <label style="font-size:10px;color:#9ca3af;display:block;text-align:left;margin-bottom:3px;">Domain</label>
        <input type="text" id="rdp-domain" class="form-input" placeholder="WORKGROUP">
        <label style="font-size:10px;color:#9ca3af;display:block;text-align:left;margin-bottom:3px;">Master Password</label>
        <input type="password" id="rdp-master-pw" class="form-input" placeholder="Master password…">
        <label style="font-size:10px;color:#9ca3af;display:block;text-align:left;margin-bottom:3px;">Password</label>
        <input type="password" id="rdp-password" class="form-input" placeholder="RDP password…">
        <button class="btn-connect" onclick="connectRdp()">
            <span style="font-size:14px;">⏻</span> Connect
        </button>
        <div id="connect-err" style="display:none;font-size:10px;color:#f87171;margin-top:7px;"></div>
    </div>

    <!-- Error panel -->
    <div class="error-panel" id="error-panel">
        <span style="font-size:48px;">🔌</span>
        <p style="color:#d1d5db;font-size:13px;" id="error-msg">Connection error</p>
        <button onclick="showConnect()" style="padding:7px 18px;border-radius:9px;background:#6366f1;color:#fff;border:none;cursor:pointer;font-size:12px;">Try Again</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/guacamole-common-js@1.5.0/dist/guacamole-common.min.js"></script>
<script>
const SERVER_ID = {{ server.id }};
const WS_SCHEME = location.protocol === 'https:' ? 'wss' : 'ws';
let guacClient = null;

function setStatus(cls, txt) {
    const p=document.getElementById('status-pill');const t=document.getElementById('status-text');
    p.className='status-pill '+cls; t.textContent=txt;
}
function showConnect() {
    document.getElementById('connect-card').style.display='block';
    document.getElementById('error-panel').classList.remove('visible');
    document.getElementById('disconnect-btn').style.display='none';
    setStatus('disconnected','Disconnected');
}
function connectRdp() {
    const domain=document.getElementById('rdp-domain').value.trim();
    const masterPw=document.getElementById('rdp-master-pw').value;
    const password=document.getElementById('rdp-password').value;
    document.getElementById('connect-card').style.display='none';
    document.getElementById('connect-err').style.display='none';
    setStatus('connecting','Connecting…');
    const params=new URLSearchParams({server_id:SERVER_ID,master_password:masterPw,password,domain});
    try {
        const tunnel=new Guacamole.WebSocketTunnel(`${WS_SCHEME}://${location.host}/ws/servers/${SERVER_ID}/rdp/?${params}`);
        guacClient=new Guacamole.Client(tunnel);
        const container=document.getElementById('rdp-canvas');container.innerHTML='';
        container.appendChild(guacClient.getDisplay().getElement());
        guacClient.onerror=e=>{setStatus('error','Error');document.getElementById('error-panel').classList.add('visible');document.getElementById('error-msg').textContent=e.message||'Connection failed';document.getElementById('disconnect-btn').style.display='none';};
        tunnel.onstatechange=s=>{
            if(s===Guacamole.Tunnel.State.OPEN){setStatus('connected','Connected');document.getElementById('disconnect-btn').style.display='';setupInput();const d=document.getElementById('rdp-area');guacClient.sendSize(d.clientWidth,d.clientHeight);}
            else if(s===Guacamole.Tunnel.State.CLOSED){setStatus('disconnected','Disconnected');}
        };
        guacClient.connect(params.toString());
    } catch(e) {
        setStatus('error','Error');document.getElementById('error-panel').classList.add('visible');document.getElementById('error-msg').textContent=e.message||'Failed';
    }
}
function disconnectRdp(){if(guacClient){try{guacClient.disconnect();}catch{}guacClient=null;}showConnect();}
function setupInput(){
    if(!guacClient)return;
    const d=document.getElementById('rdp-area');
    const mouse=new Guacamole.Mouse(d);
    mouse.onmousedown=mouse.onmouseup=mouse.onmousemove=s=>guacClient.sendMouseState(s);
    const kb=new Guacamole.Keyboard(document);
    kb.onkeydown=k=>guacClient.sendKeyEvent(1,k);kb.onkeyup=k=>guacClient.sendKeyEvent(0,k);
    window.addEventListener('resize',()=>{const d=document.getElementById('rdp-area');if(guacClient)guacClient.sendSize(d.clientWidth,d.clientHeight);});
}
function sendCtrlAltDel(){if(!guacClient)return;[0xFFE3,0xFFE9,0xFFFF].forEach(k=>guacClient.sendKeyEvent(1,k));setTimeout(()=>[0xFFE3,0xFFE9,0xFFFF].forEach(k=>guacClient.sendKeyEvent(0,k)),100);}
function toggleFs(){if(!document.fullscreenElement){document.documentElement.requestFullscreen();document.getElementById('fs-btn').textContent='⊠';}else{document.exitFullscreen();document.getElementById('fs-btn').textContent='⛶';}}
</script>
</body>
</html>
