{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ server.name }} — Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
    darkMode: 'class',
    theme: { extend: { fontFamily: { sans: ['DM Sans','system-ui','sans-serif'], mono: ['JetBrains Mono','monospace'] } } }
}
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #080809; color: #d4d4d8; font-family: 'DM Sans', sans-serif; }
/* ── Tab bar ── */
.tab-bar { display:flex; align-items:center; background:#0a0a0c; border-bottom:1px solid rgba(255,255,255,.07); padding:0 8px; min-height:40px; overflow-x:auto; flex-shrink:0; }
.terminal-tab { display:inline-flex; align-items:center; gap:5px; padding:6px 12px; border-radius:8px 8px 0 0; font-size:12px; font-weight:500; cursor:pointer; color:#9ca3af; background:transparent; border:none; border-bottom:2px solid transparent; margin-bottom:-1px; white-space:nowrap; transition:color .15s; flex-shrink:0; }
.terminal-tab.active { color:#fff; border-bottom-color:#6366f1; background:rgba(99,102,241,.08); }
.tab-status { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.tab-status.connected { background:#22c55e; box-shadow:0 0 4px rgba(34,197,94,.6); }
.tab-status.connecting { background:#f59e0b; animation:blink .8s step-end infinite; }
.tab-status.error { background:#ef4444; }
.tab-status.disconnected { background:#6b7280; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.tab-close { width:14px; height:14px; border-radius:3px; border:none; background:transparent; color:#6b7280; cursor:pointer; font-size:11px; transition:color .15s; }
.tab-close:hover { color:#ef4444; }
.tab-add-btn { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:7px; border:none; background:transparent; color:#6b7280; cursor:pointer; font-size:18px; margin-left:4px; transition:color .15s; }
.tab-add-btn:hover { color:#fff; background:rgba(255,255,255,.08); }
/* ── Toolbar ── */
.toolbar { display:flex; align-items:center; gap:5px; padding:5px 10px; background:#0d0d0f; border-bottom:1px solid rgba(255,255,255,.05); flex-shrink:0; }
.status-pill { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:10px; font-weight:600; background:rgba(107,114,128,.1); border:1px solid rgba(107,114,128,.3); color:#9ca3af; }
.status-pill.connected { background:rgba(34,197,94,.1); border-color:rgba(34,197,94,.3); color:#4ade80; }
.status-pill.connecting { background:rgba(245,158,11,.1); border-color:rgba(245,158,11,.3); color:#fbbf24; }
.status-pill.error { background:rgba(239,68,68,.1); border-color:rgba(239,68,68,.3); color:#f87171; }
.tb-btn { display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:6px; border:none; background:transparent; color:#6b7280; cursor:pointer; font-size:15px; transition:all .15s; }
.tb-btn:hover { background:rgba(255,255,255,.1); color:#fff; }
.tb-btn.active { background:rgba(99,102,241,.2); color:#818cf8; }
/* ── Work area ── */
.work-area { display:flex; flex:1; min-height:0; overflow:hidden; }
.terminal-area { flex:1; min-width:0; background:#0a0a0b; position:relative; display:flex; flex-direction:column; }
#xterm-container { flex:1; min-height:0; padding:3px; }
.reconnect-overlay { position:absolute; inset:0; z-index:50; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,.7); gap:10px; }
.reconnect-overlay.visible { display:flex; }
/* ── Resize handle ── */
.resize-handle { width:4px; cursor:col-resize; background:transparent; flex-shrink:0; transition:background .15s; }
.resize-handle:hover, .resize-handle.dragging { background:rgba(99,102,241,.4); }
/* ── AI Panel ── */
.ai-panel { width:0; overflow:hidden; flex-shrink:0; background:#0e0e11; border-left:1px solid rgba(255,255,255,.07); display:flex; flex-direction:column; transition:width .3s ease; }
.ai-panel.open { width:var(--ai-w,340px); }
.ai-header { display:flex; align-items:center; gap:7px; padding:9px 12px; border-bottom:1px solid rgba(255,255,255,.06); flex-shrink:0; }
.ai-messages { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; }
.ai-input-wrap { padding:8px 10px; border-top:1px solid rgba(255,255,255,.06); flex-shrink:0; display:flex; gap:5px; align-items:flex-end; }
/* ── Message styles ── */
.msg-user { align-self:flex-end; max-width:85%; background:rgba(99,102,241,.18); border:1px solid rgba(99,102,241,.3); padding:7px 10px; border-radius:10px 10px 2px 10px; font-size:11px; color:#e0e7ff; }
.msg-ai { align-self:flex-start; max-width:95%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); padding:7px 10px; border-radius:10px 10px 10px 2px; font-size:11px; color:#d1d5db; }
.msg-ai h1,.msg-ai h2,.msg-ai h3 { font-weight:700; margin:.4em 0 .2em; color:#f1f5f9; }
.msg-ai p { margin:.2em 0; }
.msg-ai ul,.msg-ai ol { padding-left:1em; margin:.2em 0; }
.msg-ai code { font-family:'JetBrains Mono',monospace; background:rgba(0,0,0,.35); padding:1px 4px; border-radius:3px; font-size:10px; color:#67e8f9; }
.msg-ai pre { background:rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.08); border-radius:6px; padding:6px 8px; overflow-x:auto; margin:.3em 0; }
.msg-ai pre code { background:none; padding:0; color:#a5f3fc; }
.msg-system { align-self:center; font-size:10px; color:#6b7280; padding:3px 8px; border-radius:20px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); }
/* ── Command card ── */
.cmd-card { background:rgba(6,182,212,.05); border:1px solid rgba(6,182,212,.2); border-radius:8px; padding:8px 10px; font-size:11px; }
.cmd-card code { display:block; font-family:'JetBrains Mono',monospace; font-size:10px; color:#67e8f9; background:rgba(0,0,0,.3); padding:5px 8px; border-radius:5px; margin:5px 0; white-space:pre-wrap; word-break:break-all; }
/* ── Report card ── */
.report-card { border-radius:8px; padding:8px 10px; font-size:11px; }
.report-card.ok      { background:rgba(34,197,94,.06);  border:1px solid rgba(34,197,94,.2); }
.report-card.warning { background:rgba(245,158,11,.06); border:1px solid rgba(245,158,11,.2); }
.report-card.error   { background:rgba(239,68,68,.06);  border:1px solid rgba(239,68,68,.2); }
/* ── Suggestion ── */
.suggestion-btn { display:block; width:100%; text-align:left; padding:7px 10px; border-radius:8px; font-size:11px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); color:#9ca3af; cursor:pointer; transition:all .15s; margin-bottom:4px; }
.suggestion-btn:hover { background:rgba(99,102,241,.1); border-color:rgba(99,102,241,.3); color:#c7d2fe; }
/* ── Add server dropdown ── */
.add-server-dropdown { position:absolute; top:100%; left:0; min-width:200px; z-index:200; background:#1a1a1e; border:1px solid rgba(255,255,255,.1); border-radius:10px; box-shadow:0 12px 40px rgba(0,0,0,.6); padding:5px; display:none; margin-top:4px; }
.add-server-dropdown.open { display:block; }
.add-server-dropdown button { display:block; width:100%; text-align:left; padding:6px 9px; border-radius:6px; font-size:11px; background:transparent; color:#d1d5db; border:none; cursor:pointer; transition:background .1s; }
.add-server-dropdown button:hover { background:rgba(255,255,255,.08); }
/* ── Mode pills ── */
.mode-pill { padding:3px 8px; border-radius:20px; font-size:10px; font-weight:600; cursor:pointer; border:1px solid rgba(255,255,255,.1); color:#9ca3af; background:transparent; transition:all .15s; }
.mode-pill.active { background:rgba(99,102,241,.2); border-color:#6366f1; color:#818cf8; }
/* ── Q&A card ── */
.qa-card { background:rgba(168,85,247,.05); border:1px solid rgba(168,85,247,.2); border-radius:8px; padding:8px 10px; font-size:11px; }
/* ── Install card ── */
.install-card { background:rgba(99,102,241,.05); border:1px solid rgba(99,102,241,.15); border-radius:8px; padding:8px 10px; }
.progress-bar-track { height:3px; background:rgba(255,255,255,.1); border-radius:3px; overflow:hidden; margin-top:5px; }
.progress-bar-fill { height:100%; background:#6366f1; border-radius:3px; transition:width .3s; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body style="display:flex;flex-direction:column;height:100%;background:#080809;">

<!-- Tab Bar -->
<div class="tab-bar" id="tab-bar">
    <div class="terminal-tab active" id="tab-0">
        <span class="tab-status connecting" id="tab-status-0"></span>
        <span id="tab-name-0">{{ server.name }}</span>
    </div>
    <div style="position:relative;margin-left:4px;">
        <button class="tab-add-btn" onclick="toggleAddServerDropdown()" title="Open server in new tab">
            <span style="font-size:18px;line-height:1;">+</span>
        </button>
        <div class="add-server-dropdown" id="add-server-dropdown">
            {% for s in all_servers %}
            <button onclick="openServerTab({{ s.id }}, '{{ s.name|escapejs }}')">
                {{ s.name }} <span style="color:#6b7280;font-size:10px;">{{ s.host }}</span>
            </button>
            {% endfor %}
        </div>
    </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
    <span class="status-pill" id="main-status-pill">
        <span id="main-status-text">Disconnected</span>
    </span>
    <div style="width:1px;height:16px;background:rgba(255,255,255,.08);margin:0 2px;"></div>
    <button class="tb-btn" onclick="clearTerminal()" title="Clear">
        <span style="font-size:14px;line-height:1;">⌫</span>
    </button>
    <button class="tb-btn" id="creds-toggle" onclick="toggleCredsPopup()" title="Credentials" style="font-size:12px;">🔑</button>
    <div style="flex:1;"></div>
    <button class="mode-pill active" id="mode-auto" onclick="setMode('auto')">Auto</button>
    <button class="mode-pill" id="mode-step" onclick="setMode('step')">Step</button>
    <button class="mode-pill" id="mode-fast" onclick="setMode('fast')">Fast</button>
    <div style="width:1px;height:16px;background:rgba(255,255,255,.08);margin:0 2px;"></div>
    <button class="tb-btn active" id="ai-toggle-btn" onclick="toggleAiPanel()" title="AI" style="font-size:14px;">✨</button>
</div>

<!-- Work area -->
<div class="work-area" style="flex:1;min-height:0;" id="work-area">
    <div class="terminal-area">
        <div id="xterm-container"></div>
        <div class="reconnect-overlay" id="reconnect-overlay">
            <span style="font-size:36px;">🔌</span>
            <p style="color:#9ca3af;font-size:13px;">Connection lost</p>
            <button onclick="reconnectCurrent()" style="padding:6px 16px;border-radius:8px;background:#6366f1;color:#fff;border:none;cursor:pointer;font-size:12px;">Reconnect</button>
        </div>
    </div>
    <div class="resize-handle" id="resize-handle"></div>
    <div class="ai-panel open" id="ai-panel" style="--ai-w:320px;">
        <div class="ai-header">
            <span style="font-size:14px;">✨</span>
            <div style="flex:1;">
                <div style="font-size:12px;font-weight:700;color:#fff;">AI Assistant</div>
                <div style="font-size:10px;color:#6b7280;" id="ai-status-text">Ready</div>
            </div>
            <button class="tb-btn" id="ai-stop-btn" onclick="sendAiStop()" style="display:none;color:#ef4444;" title="Stop">■</button>
            <button class="tb-btn" onclick="toggleAiPanel()" style="font-size:14px;">›</button>
        </div>
        <div class="ai-messages" id="ai-messages">
            <div id="ai-welcome">
                <div style="text-align:center;padding:12px 6px;">
                    <p style="font-size:11px;color:#9ca3af;margin-bottom:12px;">Ask me anything about this server.</p>
                </div>
                <button class="suggestion-btn" onclick="sendSuggestion('Check disk usage and free space')">💽 Check disk usage</button>
                <button class="suggestion-btn" onclick="sendSuggestion('Show memory and top processes')">🧠 Memory & processes</button>
                <button class="suggestion-btn" onclick="sendSuggestion('Check network and open ports')">🌐 Network status</button>
                <button class="suggestion-btn" onclick="sendSuggestion('Show OS info and uptime')">🖥️ OS info & uptime</button>
            </div>
        </div>
        <div class="ai-input-wrap">
            <textarea id="ai-input" rows="2" placeholder="Ask AI…"
                style="flex:1;padding:7px 9px;border-radius:8px;font-size:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;outline:none;resize:none;font-family:inherit;"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAiMessage();}"></textarea>
            <button onclick="sendAiMessage()" style="padding:7px 9px;border-radius:8px;background:#6366f1;color:#fff;border:none;cursor:pointer;flex-shrink:0;">▶</button>
        </div>
    </div>
</div>

<!-- Credentials popup -->
<div id="creds-popup" style="display:none;position:fixed;bottom:56px;left:10px;z-index:300;background:#1a1a1e;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:14px;width:220px;box-shadow:0 12px 40px rgba(0,0,0,.6);">
    <div style="font-size:11px;color:#9ca3af;margin-bottom:8px;font-weight:600;">Credentials</div>
    <div style="margin-bottom:8px;">
        <label style="font-size:10px;color:#6b7280;display:block;margin-bottom:3px;">Master Password</label>
        <input type="password" id="creds-master-pw" style="width:100%;padding:6px 8px;border-radius:7px;font-size:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;outline:none;" placeholder="Master password…">
    </div>
    <div style="margin-bottom:10px;">
        <label style="font-size:10px;color:#6b7280;display:block;margin-bottom:3px;">Password</label>
        <input type="password" id="creds-password" style="width:100%;padding:6px 8px;border-radius:7px;font-size:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;outline:none;" placeholder="Password…">
    </div>
    <button onclick="connectCurrent()" style="width:100%;padding:7px;border-radius:8px;background:#6366f1;color:#fff;border:none;cursor:pointer;font-size:11px;font-weight:600;margin-bottom:5px;">Connect</button>
    <button onclick="disconnectCurrent()" style="width:100%;padding:7px;border-radius:8px;background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2);cursor:pointer;font-size:11px;">Disconnect</button>
</div>

<script>
const INITIAL_SERVER_ID   = {{ server.id }};
const INITIAL_SERVER_NAME = "{{ server.name|escapejs }}";
const WS_SCHEME = location.protocol === 'https:' ? 'wss' : 'ws';

let tabs = [];
let activeTab = 0;
let aiPanelOpen = true;
let aiMode = 'auto';
let nextTabId = 1;

function createTerminal() {
    const term = new Terminal({
        theme: { background:'#080809', foreground:'#d4d4d8', cursor:'#6366f1', selectionBackground:'rgba(99,102,241,.3)' },
        fontFamily: "'JetBrains Mono','Consolas',monospace", fontSize:12, lineHeight:1.4,
        scrollback:3000, cursorBlink:true, allowProposedApi:true,
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    return { term, fitAddon };
}

function initTab0() {
    const { term, fitAddon } = createTerminal();
    term.open(document.getElementById('xterm-container'));
    fitAddon.fit();
    tabs.push({ id:0, serverId:INITIAL_SERVER_ID, serverName:INITIAL_SERVER_NAME, term, fitAddon, ws:null, status:'disconnected' });
    term.onData(data => sendInput(0, data));
    connectTab(0);
}

function connectTab(tabIdx) {
    const tab = tabs[tabIdx];
    if (!tab) return;
    setTabStatus(tabIdx, 'connecting');
    const ws = new WebSocket(`${WS_SCHEME}://${location.host}/ws/servers/${tab.serverId}/terminal/`);
    tab.ws = ws;
    ws.onopen = () => ws.send(JSON.stringify({
        type:'connect', server_id:tab.serverId,
        master_password: document.getElementById('creds-master-pw')?.value || '',
        password: document.getElementById('creds-password')?.value || '',
    }));
    ws.onmessage = e => {
        let msg; try { msg = JSON.parse(e.data); } catch { return; }
        handleWsMsg(tabIdx, msg);
    };
    ws.onerror = () => setTabStatus(tabIdx, 'error');
    ws.onclose = () => { setTabStatus(tabIdx, 'disconnected'); if (tabIdx===activeTab) showReconnect(true); };
}

function handleWsMsg(tabIdx, msg) {
    const tab = tabs[tabIdx];
    if (!tab) return;
    switch(msg.type) {
        case 'ready': case 'status':
            if (msg.status==='connected') { setTabStatus(tabIdx,'connected'); showReconnect(false); tab.fitAddon.fit(); sendResize(tabIdx); }
            else if (msg.error||msg.status==='error') setTabStatus(tabIdx,'error');
            break;
        case 'output': if (tabIdx===activeTab) tab.term.write(msg.data||''); break;
        case 'error': setTabStatus(tabIdx,'error'); appendMsg('system','⚠ '+(msg.message||'Error')); break;
        case 'exit': setTabStatus(tabIdx,'disconnected'); if(tabIdx===activeTab) showReconnect(true); break;
        case 'ai_status': document.getElementById('ai-status-text').textContent=msg.status||'Working…'; if(msg.done||msg.status==='done') setAiRunning(false); else if(msg.thinking) setAiRunning(true); break;
        case 'ai_response': if(msg.text) appendMsg('ai',msg.text); if(msg.done) setAiRunning(false); break;
        case 'ai_command_status': if(msg.command) addCmdCard(msg); break;
        case 'ai_report': addReportCard(msg); setAiRunning(false); break;
        case 'ai_error': appendMsg('system','⚠ AI: '+(msg.message||'')); setAiRunning(false); break;
        case 'ai_question': addQaCard(msg); break;
        case 'ai_install_progress': updateInstallCard(msg); break;
    }
}

function sendInput(tabIdx, data) {
    const ws = tabs[tabIdx]?.ws;
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type:'input',data}));
}
function sendResize(tabIdx) {
    const tab = tabs[tabIdx];
    if (!tab?.ws || tab.ws.readyState !== WebSocket.OPEN) return;
    tab.ws.send(JSON.stringify({type:'resize',cols:tab.term.cols,rows:tab.term.rows}));
}

function switchTerminalTab(idx) {
    if (idx === activeTab) return;
    const prev = tabs[activeTab]; const next = tabs[idx];
    if (!next) return;
    if (prev) { document.getElementById(`tab-${prev.id}`)?.classList.remove('active'); prev.term.element?.remove(); }
    activeTab = idx;
    document.getElementById(`tab-${next.id}`)?.classList.add('active');
    const c = document.getElementById('xterm-container'); c.innerHTML='';
    next.term.open(c); next.fitAddon.fit();
    updateStatusPill(next.status);
    showReconnect(next.status === 'disconnected');
}

function openServerTab(serverId, serverName) {
    toggleAddServerDropdown(false);
    const id = nextTabId++;
    const { term, fitAddon } = createTerminal();
    const tabIdx = tabs.length;
    const bar = document.getElementById('tab-bar');
    const addBtn = bar.querySelector('.tab-add-btn').parentElement;
    const el = document.createElement('div');
    el.className = 'terminal-tab';
    el.id = 'tab-'+id;
    el.innerHTML = `<span class="tab-status connecting" id="tab-status-${id}"></span><span>${escHtml(serverName)}</span><button class="tab-close" onclick="event.stopPropagation();closeTab(${tabIdx})">✕</button>`;
    el.onclick = () => switchTerminalTab(tabIdx);
    bar.insertBefore(el, addBtn);
    tabs.push({id, serverId, serverName, term, fitAddon, ws:null, status:'disconnected'});
    term.onData(data => sendInput(tabIdx, data));
    switchTerminalTab(tabIdx);
    connectTab(tabIdx);
}

function closeTab(tabIdx) {
    const tab = tabs[tabIdx];
    if (!tab) return;
    if (tab.ws) tab.ws.close();
    document.getElementById('tab-'+tab.id)?.remove();
    tabs.splice(tabIdx, 1);
    if (activeTab >= tabs.length) activeTab = tabs.length-1;
    if (activeTab >= 0) switchTerminalTab(activeTab);
}

function toggleAddServerDropdown(force) {
    const dd = document.getElementById('add-server-dropdown');
    const open = force !== undefined ? force : !dd.classList.contains('open');
    dd.classList.toggle('open', open);
}

function setTabStatus(tabIdx, status) {
    const tab = tabs[tabIdx]; if (!tab) return;
    tab.status = status;
    const dot = document.getElementById('tab-status-'+tab.id);
    if (dot) dot.className = 'tab-status '+status;
    if (tabIdx === activeTab) updateStatusPill(status);
}
function updateStatusPill(status) {
    const pill = document.getElementById('main-status-pill');
    const txt = document.getElementById('main-status-text');
    if (!pill) return;
    pill.className = 'status-pill '+status;
    txt.textContent = {connected:'Connected',connecting:'Connecting…',error:'Error',disconnected:'Disconnected'}[status]||status;
}
function showReconnect(show) { document.getElementById('reconnect-overlay').classList.toggle('visible', show); }

function connectCurrent() { const tab=tabs[activeTab]; if(!tab) return; if(tab.ws){try{tab.ws.close();}catch{}} connectTab(activeTab); }
function disconnectCurrent() { const tab=tabs[activeTab]; if(tab?.ws&&tab.ws.readyState===WebSocket.OPEN){tab.ws.send(JSON.stringify({type:'disconnect'}));tab.ws.close();} }
function reconnectCurrent() { showReconnect(false); connectCurrent(); }
function clearTerminal() { tabs[activeTab]?.term.clear(); }

function toggleCredsPopup() { const p=document.getElementById('creds-popup'); p.style.display=p.style.display==='none'?'block':'none'; }
function toggleAiPanel() {
    aiPanelOpen=!aiPanelOpen;
    document.getElementById('ai-panel').classList.toggle('open',aiPanelOpen);
    document.getElementById('ai-toggle-btn').classList.toggle('active',aiPanelOpen);
    setTimeout(()=>{tabs[activeTab]?.fitAddon.fit();sendResize(activeTab);},310);
}
function setMode(m) { aiMode=m; ['auto','step','fast'].forEach(x=>document.getElementById('mode-'+x).classList.toggle('active',x===m)); }

function setAiRunning(r) {
    document.getElementById('ai-stop-btn').style.display=r?'flex':'none';
    document.getElementById('ai-status-text').textContent=r?'Working…':'Ready';
}
function sendAiStop() {
    const ws=tabs[activeTab]?.ws;
    if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({type:'ai_stop'}));
    setAiRunning(false);
}
function sendAiMessage() {
    const inp=document.getElementById('ai-input');
    const text=inp.value.trim(); if(!text) return;
    inp.value='';
    document.getElementById('ai-welcome')?.remove();
    appendMsg('user',text);
    const ws=tabs[activeTab]?.ws;
    if(!ws||ws.readyState!==WebSocket.OPEN){appendMsg('system','⚠ Not connected');return;}
    ws.send(JSON.stringify({type:'ai_request',message:text,mode:aiMode}));
    setAiRunning(true);
}
function sendSuggestion(text){document.getElementById('ai-input').value=text;sendAiMessage();}

function appendMsg(type, text) {
    const c=document.getElementById('ai-messages');
    const d=document.createElement('div');
    if(type==='user'){d.className='msg-user';d.textContent=text;}
    else if(type==='ai'){d.className='msg-ai';d.innerHTML=marked.parse?marked.parse(text):escHtml(text);}
    else{d.className='msg-system';d.textContent=text;}
    c.appendChild(d);c.scrollTop=c.scrollHeight;return d;
}

function addCmdCard(msg) {
    const c=document.getElementById('ai-messages');
    const d=document.createElement('div');
    d.className='cmd-card';d.id='cmd-'+(msg.command_id||Date.now());
    d.innerHTML=`<div style="font-size:10px;color:#9ca3af;margin-bottom:4px;">Proposed command:</div><code>${escHtml(msg.command||'')}</code><div id="cmd-a-${msg.command_id||0}" style="display:flex;gap:5px;margin-top:6px;"><button onclick="approveCmd('${msg.command_id||0}')" style="padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.25);cursor:pointer;">✓ Approve</button><button onclick="skipCmd('${msg.command_id||0}')" style="padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);cursor:pointer;">⊘ Skip</button></div>`;
    c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function approveCmd(id) {
    const ws=tabs[activeTab]?.ws;
    if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'ai_confirm',command_id:id}));
    const a=document.getElementById('cmd-a-'+id);if(a)a.innerHTML='<span style="font-size:10px;color:#4ade80;">✓ Approved</span>';
}
function skipCmd(id) {
    const ws=tabs[activeTab]?.ws;
    if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'ai_cancel',command_id:id}));
    const a=document.getElementById('cmd-a-'+id);if(a)a.innerHTML='<span style="font-size:10px;color:#f87171;">⊘ Skipped</span>';
}
function addQaCard(msg) {
    const c=document.getElementById('ai-messages');
    const qid='qa-'+Date.now();
    const d=document.createElement('div');d.className='qa-card';d.id=qid;
    d.innerHTML=`<div style="font-size:10px;color:#c084fc;margin-bottom:4px;">AI Question</div><p style="font-size:11px;color:#e9d5ff;margin-bottom:6px;">${escHtml(msg.question||'')}</p><div style="display:flex;gap:5px;"><input type="text" id="${qid}-i" style="flex:1;padding:5px 7px;border-radius:6px;font-size:10px;background:rgba(255,255,255,.05);border:1px solid rgba(168,85,247,.2);color:#fff;outline:none;"><button onclick="replyQa('${qid}','${msg.question_id||''}')" style="padding:5px 8px;border-radius:6px;font-size:10px;background:rgba(168,85,247,.2);color:#c084fc;border:1px solid rgba(168,85,247,.3);cursor:pointer;">Reply</button></div>`;
    c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function replyQa(qid, qIdStr) {
    const inp=document.getElementById(qid+'-i');
    const answer=inp?.value.trim()||'';
    const ws=tabs[activeTab]?.ws;
    if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'ai_reply',question_id:qIdStr,answer}));
    document.getElementById(qid).innerHTML=`<p style="font-size:10px;color:#9ca3af;">Answered: ${escHtml(answer)}</p>`;
}
function addReportCard(msg) {
    const s=msg.status||'ok';
    const col={ok:'#4ade80',warning:'#fbbf24',error:'#f87171'}[s]||'#9ca3af';
    const c=document.getElementById('ai-messages');
    const d=document.createElement('div');d.className=`report-card ${s}`;
    d.innerHTML=`<div style="font-size:10px;font-weight:700;color:${col};margin-bottom:4px;">${(msg.title||'Report').toUpperCase()}</div>${msg.summary?`<p style="font-size:11px;color:#d1d5db;">${escHtml(msg.summary)}</p>`:''}${msg.details?`<pre style="font-size:9px;color:#9ca3af;white-space:pre-wrap;margin-top:4px;font-family:'JetBrains Mono',monospace;">${escHtml(msg.details)}</pre>`:''}`;
    c.appendChild(d);c.scrollTop=c.scrollHeight;
}
const installCards={};
function updateInstallCard(msg) {
    const c=document.getElementById('ai-messages');
    const key=msg.command||'install';
    if(!installCards[key]) {
        const d=document.createElement('div');d.className='install-card';d.id='ic-'+Date.now();
        d.innerHTML=`<div style="font-size:10px;color:#818cf8;margin-bottom:3px;">${escHtml(key)}</div><div class="progress-bar-track"><div class="progress-bar-fill" id="ib-${d.id}" style="width:10%"></div></div>`;
        c.appendChild(d);c.scrollTop=c.scrollHeight;installCards[key]=d;
    }
    const bar=document.getElementById('ib-'+installCards[key].id);
    if(bar)bar.style.width=(msg.progress||50)+'%';
    if(msg.done)delete installCards[key];
}

// Resize handle
(function() {
    const h=document.getElementById('resize-handle');
    let dragging=false,startX=0,startW=320;
    h.addEventListener('mousedown',e=>{dragging=true;startX=e.clientX;const p=document.getElementById('ai-panel');startW=parseInt(p.style.getPropertyValue('--ai-w')||320);h.classList.add('dragging');document.body.style.cursor='col-resize';document.body.style.userSelect='none';});
    document.addEventListener('mousemove',e=>{if(!dragging)return;const d=startX-e.clientX;const w=Math.max(200,Math.min(500,startW+d));document.getElementById('ai-panel').style.setProperty('--ai-w',w+'px');tabs[activeTab]?.fitAddon.fit();});
    document.addEventListener('mouseup',()=>{if(!dragging)return;dragging=false;h.classList.remove('dragging');document.body.style.cursor='';document.body.style.userSelect='';sendResize(activeTab);});
})();

window.addEventListener('resize',()=>{tabs[activeTab]?.fitAddon.fit();sendResize(activeTab);});
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener('DOMContentLoaded', initTab0);
document.addEventListener('click',e=>{const dd=document.getElementById('add-server-dropdown');if(dd&&!e.target.closest('.tab-add-btn')&&!dd.contains(e.target))dd.classList.remove('open');const cp=document.getElementById('creds-popup');if(cp&&cp.style.display!=='none'&&!cp.contains(e.target)&&!e.target.closest('#creds-toggle'))cp.style.display='none';});
</script>
</body>
